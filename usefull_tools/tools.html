<!DOCTYPE html>
<html lang="sk">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Moje odkazy</title>
<style>
:root {
  --bg: #f4f6f8;
  --text: #111;
  --card: #ffffff;
  --header: #2563eb;
  --link: #2563eb;
  --block: #f9fafb;
  --shadow: 0 10px 25px rgba(0,0,0,0.08);
}
body.dark {
  --bg: #0f172a;
  --text: #e5e7eb;
  --card: #020617;
  --header: #020617;
  --link: #60a5fa;
  --block: #020617;
  --shadow: 0 10px 25px rgba(0,0,0,0.5);
}
body {
  font-family: system-ui, Arial, sans-serif;
  background: var(--bg);
  color: var(--text);
  margin: 0;
}
header {
  background: linear-gradient(135deg, var(--header), #1d4ed8);
  color: white;
  padding: 40px 20px;
  text-align: center;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  gap: 20px;
  box-shadow: 0 8px 32px rgba(0, 0, 0, 0.2);
  border-bottom: 3px solid rgba(255, 255, 255, 0.1);
}
header h1 {
  margin: 0;
  font-size: 32px;
  font-weight: 700;
  letter-spacing: 0.5px;
  text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.3);
}
.logo {
  width: 70px;
  height: 70px;
  color: white;
  animation: spin 8s linear infinite;
  filter: drop-shadow(0 0 10px rgba(255, 255, 255, 0.3));
  flex-shrink: 0;
}
/* Quick color/offset glitch layered over spin */
.logo.glitching {
  animation: spin 8s linear infinite, glitch 0.38s steps(2, end) 1;
}
@keyframes spin {
  from { transform: rotate(0deg); }
  to { transform: rotate(360deg); }
}
@keyframes glitch {
  0% { filter: drop-shadow(2px 0 red) drop-shadow(-2px 0 cyan) hue-rotate(0deg); }
  50% { filter: drop-shadow(-2px -1px red) drop-shadow(2px 1px cyan) hue-rotate(18deg); }
  100% { filter: drop-shadow(0 0 0 rgba(0,0,0,0.2)) hue-rotate(0deg); }
}
main {
  max-width: 1000px;
  margin: 50px auto;
  padding: 0 20px;
}
h2 {
  margin: 40px 0 25px 0;
  font-size: 26px;
  font-weight: 700;
  color: var(--text);
  border-bottom: 3px solid var(--link);
  padding-bottom: 10px;
}
.grid {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(260px, 1fr));
  gap: 25px;
}
.card {
  background: var(--card);
  border-radius: 12px;
  padding: 25px;
  box-shadow: var(--shadow);
  transition: all 0.3s ease;
  border: 1px solid rgba(0, 0, 0, 0.05);
}
body.dark .card {
  border: 1px solid rgba(255, 255, 255, 0.05);
}
.card:hover { 
  transform: translateY(-6px);
  box-shadow: 0 15px 40px rgba(0, 0, 0, 0.15);
}
body.dark .card:hover {
  box-shadow: 0 15px 40px rgba(0, 0, 0, 0.4);
}
.card a {
  color: var(--link);
  font-size: 16px;
  font-weight: 600;
  text-decoration: none;
  transition: opacity 0.2s ease;
}
.card a:hover {
  opacity: 0.8;
  text-decoration: underline;
}
.icon {
  font-size: 36px;
  margin-bottom: 15px;
  display: block;
}
.card p {
  margin: 10px 0;
  font-size: 15px;
  line-height: 1.5;
}
.card-title {
  font-weight: 700;
  font-size: 19px;
  margin-bottom: 8px;
  color: var(--text);
}
.text-block {
  background: var(--card);
  border-radius: 12px;
  padding: 25px;
  box-shadow: var(--shadow);
  border: 1px solid rgba(0, 0, 0, 0.05);
}
body.dark .text-block {
  border: 1px solid rgba(255, 255, 255, 0.05);
}
.code-block {
  background: var(--block);
  padding: 15px;
  border-radius: 8px;
  font-family: 'Courier New', monospace;
  font-size: 13px;
  overflow-x: auto;
  margin: 15px 0;
  border-left: 4px solid var(--link);
}
.toggle {
  position: fixed;
  top: 20px;
  right: 20px;
  padding: 10px 14px;
  border: 2px solid white;
  border-radius: 999px;
  cursor: pointer;
  background: rgba(0, 0, 0, 0.3);
  font-size: 18px;
  transition: all 0.3s ease;
  z-index: 1000;
}
.toggle:hover {
  background: rgba(0, 0, 0, 0.5);
  transform: scale(1.1);
}
</style>

<body>

// ============================================
// RENDERING ENGINE - No need to edit below
// ============================================
function renderContent() {
  document.querySelector('header h1').textContent = config.pageTitle;
  document.querySelector('header p').textContent = config.pageSubtitle;
  
  const mainContent = document.getElementById('mainContent');
  mainContent.innerHTML = '';
  
  config.sections.forEach(section => {
    const sectionEl = document.createElement('section');
    
    const titleEl = document.createElement('h2');
    titleEl.textContent = section.title;
    sectionEl.appendChild(titleEl);
    
    if (section.type === 'cards') {
      renderCards(sectionEl, section.items);
    } else if (section.type === 'text') {
      renderTextBlocks(sectionEl, section.items);
    }
    
    mainContent.appendChild(sectionEl);
  });
}

function renderCards(parent, items) {
  const grid = document.createElement('div');
  grid.className = 'grid';
  
  items.forEach(item => {
    const card = document.createElement('div');
    card.className = 'card';
    
    let html = '';
    
    if (item.icon) {
      html += `<div class="icon">${item.icon}</div>`;
    }
    
    if (item.title) {
      html += `<div class="card-title">${item.title}</div>`;
    }
    
    if (item.description) {
      html += `<p><strong>${item.description}</strong></p>`;
    }
    
    if (item.details && Array.isArray(item.details)) {
      item.details.forEach(detail => {
        html += `<p>${detail}</p>`;
      });
    }
    
    if (item.links && Array.isArray(item.links)) {
      item.links.forEach(link => {
        html += `<p><a href="${link.url}" target="_blank">${link.text}</a></p>`;
      });
    }
    
    if (item.code) {
      html += `<div class="code-block">${escapeHtml(item.code)}</div>`;
    }
    
    card.innerHTML = html;
    grid.appendChild(card);
  });
  
  parent.appendChild(grid);
}

function renderTextBlocks(parent, items) {
  const grid = document.createElement('div');
  grid.className = 'grid';
  
  items.forEach(item => {
    const block = document.createElement('div');
    block.className = 'text-block';
    
    let html = '';
    
    if (item.subtitle) {
      html += `<h3>${item.subtitle}</h3>`;
    }
    
    if (item.content && Array.isArray(item.content)) {
      item.content.forEach(text => {
        html += `<p>${text}</p>`;
      });
    }
    
    if (item.links && Array.isArray(item.links)) {
      item.links.forEach(link => {
        html += `<p><a href="${link.url}" download>${link.text}</a></p>`;
      });
    }
    
    if (item.code) {
      html += `<div class="code-block">${escapeHtml(item.code)}</div>`;
    }
    
    if (item.steps && Array.isArray(item.steps)) {
      item.steps.forEach(step => {
        html += `<p>${step}</p>`;
      });
    }
    
    block.innerHTML = html;
    grid.appendChild(block);
  });
  
  parent.appendChild(grid);
}

function escapeHtml(text) {
  const map = {
    '&': '&amp;',
    '<': '&lt;',
    '>': '&gt;',
    '"': '&quot;',
    "'": '&#039;'
  };
  return text.replace(/[&<>"']/g, m => map[m]);
}

// Theme toggle - Auto dark mode
function initTheme() {
  const savedTheme = localStorage.getItem('theme');
  if (savedTheme) {
    document.body.classList.toggle('dark', savedTheme === 'dark');
  } else {
    // Default to dark mode
    document.body.classList.add('dark');
    localStorage.setItem('theme', 'dark');
  }
}

function toggleTheme() {
  document.body.classList.toggle('dark');
  localStorage.setItem('theme', document.body.classList.contains('dark') ? 'dark' : 'light');
}

// Occasionally trigger a short glitch on the logo
function setupLogoGlitch() {
  const logo = document.querySelector('.logo');
  if (!logo) return;

  const runGlitch = () => {
    if (!logo.classList.contains('glitching')) {
      logo.classList.add('glitching');
      setTimeout(() => logo.classList.remove('glitching'), 450);
    }
    const next = 2500 + Math.random() * 4500; // 2.5s - 7s
    setTimeout(runGlitch, next);
  };

  setTimeout(runGlitch, 1800);
}

// Render on load
document.addEventListener('DOMContentLoaded', () => {
  initTheme();
  renderContent();
  setupLogoGlitch();
});
