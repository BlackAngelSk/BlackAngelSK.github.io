<!DOCTYPE html>
<html lang="sk">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Basic Photo Editor Pro</title>
  <style>
    :root {
      --bg: #0f172a;
      --card: #111827;
      --text: #e5e7eb;
      --muted: #9ca3af;
      --accent: #60a5fa;
      --border: #1f2937;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      font-family: system-ui, Arial, sans-serif;
      background: radial-gradient(circle at top, #1e293b, #020617 65%);
      color: var(--text);
      min-height: 100vh;
      padding: 24px;
    }

    .wrap {
      max-width: 1200px;
      margin: 0 auto;
      display: grid;
      grid-template-columns: 340px 1fr;
      gap: 20px;
    }

    .panel,
    .canvas-box {
      background: rgba(17, 24, 39, 0.92);
      border: 1px solid var(--border);
      border-radius: 14px;
      box-shadow: 0 16px 45px rgba(0, 0, 0, 0.35);
      backdrop-filter: blur(5px);
    }

    .panel {
      padding: 16px;
      display: flex;
      flex-direction: column;
      gap: 14px;
      max-height: calc(100vh - 48px);
      overflow: auto;
    }

    .panel h1 {
      margin: 0;
      font-size: 1.15rem;
    }

    .hint {
      margin: 0;
      color: var(--muted);
      font-size: 0.9rem;
      line-height: 1.4;
    }

    .group {
      border-top: 1px solid var(--border);
      padding-top: 12px;
    }

    label {
      display: block;
      font-size: 0.9rem;
      margin-bottom: 6px;
      color: #d1d5db;
    }

    input[type="range"],
    input[type="text"],
    input[type="number"],
    select,
    input[type="file"] {
      width: 100%;
    }

    input[type="range"] {
      accent-color: var(--accent);
    }

    input[type="text"],
    input[type="number"],
    select {
      border: 1px solid #374151;
      background: #0b1220;
      color: var(--text);
      border-radius: 8px;
      padding: 8px 10px;
      font-size: 0.92rem;
    }

    .range-line {
      display: grid;
      grid-template-columns: 1fr auto;
      align-items: center;
      gap: 10px;
      margin-bottom: 10px;
    }

    .inline-grid-2 {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 8px;
    }

    .inline-grid-3 {
      display: grid;
      grid-template-columns: 1fr 1fr 1fr;
      gap: 8px;
    }

    .range-line output {
      color: #cbd5e1;
      font-size: 0.82rem;
      min-width: 46px;
      text-align: right;
    }

    .btn-row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
    }

    .btn-row-3 {
      display: grid;
      grid-template-columns: 1fr 1fr 1fr;
      gap: 8px;
    }

    button {
      border: none;
      border-radius: 9px;
      padding: 10px 12px;
      font-weight: 700;
      cursor: pointer;
      color: #0b1220;
      background: linear-gradient(135deg, #93c5fd, #60a5fa);
    }

    button.secondary {
      color: #dbeafe;
      border: 1px solid #2563eb;
      background: transparent;
    }

    button:disabled {
      opacity: 0.4;
      cursor: not-allowed;
    }

    button.warn {
      color: #fecaca;
      border: 1px solid #ef4444;
      background: transparent;
    }

    .small {
      font-size: 0.82rem;
      color: #94a3b8;
      margin: 0;
    }

    .canvas-box {
      padding: 12px;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 60vh;
      overflow: auto;
    }

    canvas {
      max-width: 100%;
      border-radius: 10px;
      background: #0b1220;
      border: 1px solid #374151;
      touch-action: none;
    }

    @media (max-width: 900px) {
      .wrap {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>
<body>
  <div class="wrap">
    <aside class="panel">
      <h1>Basic Photo Editor Pro</h1>
      <p class="hint">Filtre, text/logo watermark, crop, undo/redo, preview, export PNG/JPG/WebP.</p>

      <div class="group">
        <label for="upload">Vyber obrázok</label>
        <input id="upload" type="file" accept="image/*" />
      </div>

      <div class="group">
        <div class="btn-row">
          <button id="undoBtn" class="secondary" disabled>Undo</button>
          <button id="redoBtn" class="secondary" disabled>Redo</button>
        </div>
      </div>

      <div class="group">
        <label for="previewMode">Preview</label>
        <select id="previewMode">
          <option value="edited">Edited</option>
          <option value="original">Original</option>
          <option value="split">Split Before/After</option>
        </select>

        <label style="margin-top:10px;">Split pozícia</label>
        <div class="range-line">
          <input id="splitPos" type="range" min="0" max="100" value="50" />
          <output id="splitPosOut">50%</output>
        </div>
      </div>

      <div class="group">
        <label>Brightness</label>
        <div class="range-line">
          <input id="brightness" type="range" min="0" max="200" value="100" />
          <output id="brightnessOut">100%</output>
        </div>

        <label>Contrast</label>
        <div class="range-line">
          <input id="contrast" type="range" min="0" max="200" value="100" />
          <output id="contrastOut">100%</output>
        </div>

        <label>Saturate</label>
        <div class="range-line">
          <input id="saturate" type="range" min="0" max="200" value="100" />
          <output id="saturateOut">100%</output>
        </div>
      </div>

      <div class="group">
        <label for="watermarkText">Watermark text</label>
        <input id="watermarkText" type="text" placeholder="napr. © BlackAngel" value="© BlackAngel" />

        <label for="textPos" style="margin-top:10px;">Text pozícia</label>
        <select id="textPos">
          <option value="bottom-right">Dole vpravo</option>
          <option value="bottom-left">Dole vľavo</option>
          <option value="top-right">Hore vpravo</option>
          <option value="top-left">Hore vľavo</option>
          <option value="center">Stred</option>
          <option value="custom">Vlastná (ťahaním)</option>
        </select>

        <label for="fontFamily" style="margin-top:10px;">Font</label>
        <select id="fontFamily">
          <option value="Arial, sans-serif">Arial</option>
          <option value="Verdana, sans-serif">Verdana</option>
          <option value="Tahoma, sans-serif">Tahoma</option>
          <option value="Georgia, serif">Georgia</option>
          <option value="Times New Roman, serif">Times New Roman</option>
          <option value="Courier New, monospace">Courier New</option>
        </select>

        <div class="inline-grid-2" style="margin-top:10px;">
          <button id="toggleBold" class="secondary">Bold</button>
          <button id="toggleItalic" class="secondary">Italic</button>
        </div>

        <label style="margin-top:10px;">Opacity</label>
        <div class="range-line">
          <input id="textOpacity" type="range" min="0" max="100" value="45" />
          <output id="textOpacityOut">45%</output>
        </div>

        <label>Veľkosť textu</label>
        <div class="range-line">
          <input id="textSize" type="range" min="12" max="120" value="30" />
          <output id="textSizeOut">30px</output>
        </div>

        <label>Rotácia textu</label>
        <div class="range-line">
          <input id="textRotate" type="range" min="-180" max="180" value="0" />
          <output id="textRotateOut">0°</output>
        </div>

        <label for="textStrokeColor">Stroke farba</label>
        <input id="textStrokeColor" type="color" value="#000000" />

        <label style="margin-top:10px;">Stroke hrúbka</label>
        <div class="range-line">
          <input id="textStrokeWidth" type="range" min="0" max="20" value="3" />
          <output id="textStrokeWidthOut">3px</output>
        </div>

        <label for="textShadowColor">Shadow farba</label>
        <input id="textShadowColor" type="color" value="#000000" />

        <label style="margin-top:10px;">Shadow blur</label>
        <div class="range-line">
          <input id="textShadowBlur" type="range" min="0" max="50" value="8" />
          <output id="textShadowBlurOut">8</output>
        </div>

        <div class="inline-grid-2">
          <div>
            <label for="textShadowX">Shadow X</label>
            <input id="textShadowX" type="number" value="2" />
          </div>
          <div>
            <label for="textShadowY">Shadow Y</label>
            <input id="textShadowY" type="number" value="2" />
          </div>
        </div>
      </div>

      <div class="group">
        <label for="logoUpload">Logo watermark (obrázok)</label>
        <input id="logoUpload" type="file" accept="image/*" />

        <div class="btn-row" style="margin-top:10px;">
          <button id="removeLogoBtn" class="warn" disabled>Odstrániť logo</button>
          <button id="centerLogoBtn" class="secondary" disabled>Logo do stredu</button>
        </div>

        <label style="margin-top:10px;">Logo opacity</label>
        <div class="range-line">
          <input id="logoOpacity" type="range" min="0" max="100" value="60" />
          <output id="logoOpacityOut">60%</output>
        </div>

        <label>Logo scale</label>
        <div class="range-line">
          <input id="logoScale" type="range" min="10" max="300" value="100" />
          <output id="logoScaleOut">100%</output>
        </div>

        <label>Logo rotácia</label>
        <div class="range-line">
          <input id="logoRotate" type="range" min="-180" max="180" value="0" />
          <output id="logoRotateOut">0°</output>
        </div>
      </div>

      <div class="group">
        <label>Nudge target (šípky na klávesnici)</label>
        <select id="nudgeTarget">
          <option value="text">Text watermark</option>
          <option value="logo">Logo watermark</option>
        </select>
        <p class="small">Šípky = posun o 1px, Shift + šípky = 10px.</p>
      </div>

      <div class="group">
        <label>Crop tool</label>
        <div class="btn-row-3">
          <button id="cropModeBtn" class="secondary" disabled>Crop mode</button>
          <button id="applyCropBtn" disabled>Apply crop</button>
          <button id="cancelCropBtn" class="secondary" disabled>Cancel</button>
        </div>
        <p class="small">V crop mode potiahni myšou po obrázku.</p>
      </div>

      <div class="group">
        <label for="exportFormat">Export formát</label>
        <select id="exportFormat">
          <option value="png">PNG</option>
          <option value="jpeg">JPG</option>
          <option value="webp">WebP</option>
        </select>

        <label style="margin-top:10px;">Kvalita (JPG/WEBP)</label>
        <div class="range-line">
          <input id="exportQuality" type="range" min="1" max="100" value="92" />
          <output id="exportQualityOut">92%</output>
        </div>
      </div>

      <div class="group btn-row">
        <button id="downloadBtn" disabled>Stiahnuť</button>
        <button id="resetBtn" class="secondary" disabled>Reset</button>
      </div>
    </aside>

    <section class="canvas-box">
      <canvas id="canvas"></canvas>
    </section>
  </div>

  <script>
    const uploadInput = document.getElementById('upload');
    const logoUpload = document.getElementById('logoUpload');
    const canvas = document.getElementById('canvas');
    const ctx = canvas.getContext('2d');

    const undoBtn = document.getElementById('undoBtn');
    const redoBtn = document.getElementById('redoBtn');

    const previewMode = document.getElementById('previewMode');
    const splitPos = document.getElementById('splitPos');

    const brightness = document.getElementById('brightness');
    const contrast = document.getElementById('contrast');
    const saturate = document.getElementById('saturate');

    const watermarkText = document.getElementById('watermarkText');
    const textPos = document.getElementById('textPos');
    const fontFamily = document.getElementById('fontFamily');
    const toggleBold = document.getElementById('toggleBold');
    const toggleItalic = document.getElementById('toggleItalic');
    const textOpacity = document.getElementById('textOpacity');
    const textSize = document.getElementById('textSize');
    const textRotate = document.getElementById('textRotate');
    const textStrokeColor = document.getElementById('textStrokeColor');
    const textStrokeWidth = document.getElementById('textStrokeWidth');
    const textShadowColor = document.getElementById('textShadowColor');
    const textShadowBlur = document.getElementById('textShadowBlur');
    const textShadowX = document.getElementById('textShadowX');
    const textShadowY = document.getElementById('textShadowY');

    const removeLogoBtn = document.getElementById('removeLogoBtn');
    const centerLogoBtn = document.getElementById('centerLogoBtn');
    const logoOpacity = document.getElementById('logoOpacity');
    const logoScale = document.getElementById('logoScale');
    const logoRotate = document.getElementById('logoRotate');

    const nudgeTarget = document.getElementById('nudgeTarget');

    const cropModeBtn = document.getElementById('cropModeBtn');
    const applyCropBtn = document.getElementById('applyCropBtn');
    const cancelCropBtn = document.getElementById('cancelCropBtn');

    const exportFormat = document.getElementById('exportFormat');
    const exportQuality = document.getElementById('exportQuality');

    const downloadBtn = document.getElementById('downloadBtn');
    const resetBtn = document.getElementById('resetBtn');

    const outputs = {
      splitPos: document.getElementById('splitPosOut'),
      brightness: document.getElementById('brightnessOut'),
      contrast: document.getElementById('contrastOut'),
      saturate: document.getElementById('saturateOut'),
      textOpacity: document.getElementById('textOpacityOut'),
      textSize: document.getElementById('textSizeOut'),
      textRotate: document.getElementById('textRotateOut'),
      textStrokeWidth: document.getElementById('textStrokeWidthOut'),
      textShadowBlur: document.getElementById('textShadowBlurOut'),
      logoOpacity: document.getElementById('logoOpacityOut'),
      logoScale: document.getElementById('logoScaleOut'),
      logoRotate: document.getElementById('logoRotateOut'),
      exportQuality: document.getElementById('exportQualityOut')
    };

    const img = new Image();
    const logoImg = new Image();
    let hasImage = false;
    let textBounds = null;
    let logoBounds = null;

    let textIsBold = true;
    let textIsItalic = false;
    let customTextPos = null;
    let customLogoPos = null;

    let isDraggingText = false;
    let isDraggingLogo = false;
    let dragOffset = { x: 0, y: 0 };

    let cropMode = false;
    let isCropping = false;
    let cropRect = null;

    let history = [];
    let historyIndex = -1;
    const MAX_HISTORY = 20;

    function updateOutputValues() {
      outputs.splitPos.textContent = `${splitPos.value}%`;
      outputs.brightness.textContent = `${brightness.value}%`;
      outputs.contrast.textContent = `${contrast.value}%`;
      outputs.saturate.textContent = `${saturate.value}%`;
      outputs.textOpacity.textContent = `${textOpacity.value}%`;
      outputs.textSize.textContent = `${textSize.value}px`;
      outputs.textRotate.textContent = `${textRotate.value}°`;
      outputs.textStrokeWidth.textContent = `${textStrokeWidth.value}px`;
      outputs.textShadowBlur.textContent = `${textShadowBlur.value}`;
      outputs.logoOpacity.textContent = `${logoOpacity.value}%`;
      outputs.logoScale.textContent = `${logoScale.value}%`;
      outputs.logoRotate.textContent = `${logoRotate.value}°`;
      outputs.exportQuality.textContent = `${exportQuality.value}%`;

      const qualityDisabled = exportFormat.value === 'png';
      exportQuality.disabled = qualityDisabled;
    }

    function isPointInRotatedText(px, py, bounds) {
      if (!bounds) return false;
      const dx = px - bounds.x;
      const dy = py - bounds.y;
      const cos = Math.cos(-bounds.angle);
      const sin = Math.sin(-bounds.angle);
      const lx = dx * cos - dy * sin;
      const ly = dx * sin + dy * cos;

      return lx >= 0 && lx <= bounds.width && ly >= -bounds.ascent && ly <= bounds.descent;
    }

    function isPointInRotatedLogo(px, py, bounds) {
      if (!bounds) return false;
      const dx = px - bounds.cx;
      const dy = py - bounds.cy;
      const cos = Math.cos(-bounds.angle);
      const sin = Math.sin(-bounds.angle);
      const lx = dx * cos - dy * sin;
      const ly = dx * sin + dy * cos;
      return lx >= -bounds.width / 2 && lx <= bounds.width / 2 && ly >= -bounds.height / 2 && ly <= bounds.height / 2;
    }

    function getDefaultTextPosition(textWidth, fontSize) {
      const pad = Math.max(12, Math.round(canvas.width * 0.02));
      const xRight = canvas.width - textWidth - pad;
      const yBottom = canvas.height - pad;

      switch (textPos.value) {
        case 'bottom-left': return { x: pad, y: yBottom };
        case 'top-right': return { x: xRight, y: pad + fontSize };
        case 'top-left': return { x: pad, y: pad + fontSize };
        case 'center': return { x: (canvas.width - textWidth) / 2, y: canvas.height / 2 };
        case 'bottom-right':
        default:
          return { x: xRight, y: yBottom };
      }
    }

    function getTextPosition(textWidth, fontSize) {
      if (textPos.value === 'custom' && customTextPos) {
        const x = Math.min(Math.max(customTextPos.x, 0), Math.max(0, canvas.width - textWidth));
        const y = Math.min(Math.max(customTextPos.y, fontSize), canvas.height);
        return { x, y };
      }
      return getDefaultTextPosition(textWidth, fontSize);
    }

    function getLogoSize() {
      if (!logoImg.src) return { width: 0, height: 0 };
      const scale = Number(logoScale.value) / 100;
      return {
        width: logoImg.naturalWidth * scale,
        height: logoImg.naturalHeight * scale
      };
    }

    function getDefaultLogoPosition() {
      const { width, height } = getLogoSize();
      const pad = Math.max(12, Math.round(canvas.width * 0.02));
      return {
        x: canvas.width - width / 2 - pad,
        y: canvas.height - height / 2 - pad
      };
    }

    function getLogoPosition() {
      if (!logoImg.src) return { x: 0, y: 0 };
      const { width, height } = getLogoSize();
      if (!customLogoPos) customLogoPos = getDefaultLogoPosition();

      return {
        x: Math.min(Math.max(customLogoPos.x, width / 2), canvas.width - width / 2),
        y: Math.min(Math.max(customLogoPos.y, height / 2), canvas.height - height / 2)
      };
    }

    function getCanvasPoint(evt) {
      const rect = canvas.getBoundingClientRect();
      return {
        x: (evt.clientX - rect.left) * (canvas.width / rect.width),
        y: (evt.clientY - rect.top) * (canvas.height / rect.height)
      };
    }

    function drawOriginalBase() {
      ctx.filter = 'none';
      ctx.drawImage(img, 0, 0, canvas.width, canvas.height);
    }

    function drawEditedBase() {
      ctx.filter = `brightness(${brightness.value}%) contrast(${contrast.value}%) saturate(${saturate.value}%)`;
      ctx.drawImage(img, 0, 0, canvas.width, canvas.height);
      ctx.filter = 'none';
    }

    function getTextFont(size) {
      const stylePart = textIsItalic ? 'italic ' : '';
      const weightPart = textIsBold ? '700 ' : '400 ';
      return `${stylePart}${weightPart}${size}px ${fontFamily.value}`;
    }

    function drawTextWatermark() {
      const text = watermarkText.value.trim();
      if (!text) {
        textBounds = null;
        return;
      }

      const fontSize = Number(textSize.value);
      const angle = Number(textRotate.value) * Math.PI / 180;

      ctx.font = getTextFont(fontSize);
      const metrics = ctx.measureText(text);
      const textWidth = metrics.width;
      const ascent = metrics.actualBoundingBoxAscent || fontSize * 0.8;
      const descent = metrics.actualBoundingBoxDescent || fontSize * 0.2;
      const { x, y } = getTextPosition(textWidth, fontSize);

      if (textPos.value === 'custom') {
        customTextPos = { x, y };
      }

      ctx.save();
      ctx.globalAlpha = Number(textOpacity.value) / 100;
      ctx.translate(x, y);
      ctx.rotate(angle);
      ctx.shadowColor = textShadowColor.value;
      ctx.shadowBlur = Number(textShadowBlur.value);
      ctx.shadowOffsetX = Number(textShadowX.value) || 0;
      ctx.shadowOffsetY = Number(textShadowY.value) || 0;
      ctx.fillStyle = '#ffffff';

      const strokeW = Number(textStrokeWidth.value);
      if (strokeW > 0) {
        ctx.strokeStyle = textStrokeColor.value;
        ctx.lineWidth = strokeW;
        ctx.strokeText(text, 0, 0);
      }

      ctx.fillText(text, 0, 0);
      ctx.restore();

      textBounds = {
        x,
        y,
        width: textWidth,
        ascent,
        descent,
        angle
      };
    }

    function drawLogoWatermark() {
      if (!logoImg.src) {
        logoBounds = null;
        return;
      }

      const { width, height } = getLogoSize();
      if (width <= 0 || height <= 0) {
        logoBounds = null;
        return;
      }

      const pos = getLogoPosition();
      customLogoPos = { x: pos.x, y: pos.y };
      const angle = Number(logoRotate.value) * Math.PI / 180;

      ctx.save();
      ctx.globalAlpha = Number(logoOpacity.value) / 100;
      ctx.translate(pos.x, pos.y);
      ctx.rotate(angle);
      ctx.drawImage(logoImg, -width / 2, -height / 2, width, height);
      ctx.restore();

      logoBounds = {
        cx: pos.x,
        cy: pos.y,
        width,
        height,
        angle
      };
    }

    function drawEditedScene() {
      drawEditedBase();
      drawTextWatermark();
      drawLogoWatermark();
    }

    function drawCropOverlay() {
      if (!cropRect) return;
      const x = Math.min(cropRect.x, cropRect.x + cropRect.width);
      const y = Math.min(cropRect.y, cropRect.y + cropRect.height);
      const w = Math.abs(cropRect.width);
      const h = Math.abs(cropRect.height);
      if (w < 1 || h < 1) return;

      ctx.save();
      ctx.fillStyle = 'rgba(0, 0, 0, 0.45)';
      ctx.fillRect(0, 0, canvas.width, canvas.height);
      ctx.clearRect(x, y, w, h);
      ctx.strokeStyle = '#60a5fa';
      ctx.lineWidth = 2;
      ctx.setLineDash([8, 6]);
      ctx.strokeRect(x, y, w, h);
      ctx.restore();
    }

    function redraw() {
      if (!hasImage) return;

      ctx.clearRect(0, 0, canvas.width, canvas.height);

      textBounds = null;
      logoBounds = null;

      if (previewMode.value === 'original') {
        drawOriginalBase();
      } else if (previewMode.value === 'split') {
        drawOriginalBase();
        const splitX = (Number(splitPos.value) / 100) * canvas.width;

        ctx.save();
        ctx.beginPath();
        ctx.rect(splitX, 0, canvas.width - splitX, canvas.height);
        ctx.clip();
        drawEditedScene();
        ctx.restore();

        ctx.save();
        ctx.strokeStyle = '#93c5fd';
        ctx.lineWidth = 2;
        ctx.beginPath();
        ctx.moveTo(splitX, 0);
        ctx.lineTo(splitX, canvas.height);
        ctx.stroke();
        ctx.restore();
      } else {
        drawEditedScene();
      }

      if (cropMode) drawCropOverlay();
    }

    function resetControls() {
      brightness.value = 100;
      contrast.value = 100;
      saturate.value = 100;

      previewMode.value = 'edited';
      splitPos.value = 50;

      watermarkText.value = '© BlackAngel';
      textPos.value = 'bottom-right';
      fontFamily.value = 'Arial, sans-serif';
      textIsBold = true;
      textIsItalic = false;
      textOpacity.value = 45;
      textSize.value = 30;
      textRotate.value = 0;
      textStrokeColor.value = '#000000';
      textStrokeWidth.value = 3;
      textShadowColor.value = '#000000';
      textShadowBlur.value = 8;
      textShadowX.value = 2;
      textShadowY.value = 2;

      logoOpacity.value = 60;
      logoScale.value = 100;
      logoRotate.value = 0;

      exportFormat.value = 'png';
      exportQuality.value = 92;

      customTextPos = null;
      customLogoPos = null;
      cropMode = false;
      isCropping = false;
      cropRect = null;

      refreshToggleButtons();
      refreshCropButtons();
      updateOutputValues();
      redraw();
    }

    function refreshToggleButtons() {
      toggleBold.style.borderColor = textIsBold ? '#60a5fa' : '#2563eb';
      toggleBold.style.color = textIsBold ? '#93c5fd' : '#dbeafe';
      toggleItalic.style.borderColor = textIsItalic ? '#60a5fa' : '#2563eb';
      toggleItalic.style.color = textIsItalic ? '#93c5fd' : '#dbeafe';
    }

    function refreshHistoryButtons() {
      undoBtn.disabled = historyIndex <= 0;
      redoBtn.disabled = historyIndex < 0 || historyIndex >= history.length - 1;
    }

    function refreshCropButtons() {
      cropModeBtn.disabled = !hasImage;
      applyCropBtn.disabled = !cropMode || !cropRect;
      cancelCropBtn.disabled = !cropMode;
      cropModeBtn.textContent = cropMode ? 'Crop ON' : 'Crop mode';
    }

    function refreshLogoButtons() {
      const hasLogo = Boolean(logoImg.src);
      removeLogoBtn.disabled = !hasLogo;
      centerLogoBtn.disabled = !hasLogo;
    }

    function getStateSnapshot() {
      return {
        imageSrc: img.src || '',
        logoSrc: logoImg.src || '',
        controls: {
          previewMode: previewMode.value,
          splitPos: splitPos.value,
          brightness: brightness.value,
          contrast: contrast.value,
          saturate: saturate.value,
          watermarkText: watermarkText.value,
          textPos: textPos.value,
          fontFamily: fontFamily.value,
          textIsBold,
          textIsItalic,
          textOpacity: textOpacity.value,
          textSize: textSize.value,
          textRotate: textRotate.value,
          textStrokeColor: textStrokeColor.value,
          textStrokeWidth: textStrokeWidth.value,
          textShadowColor: textShadowColor.value,
          textShadowBlur: textShadowBlur.value,
          textShadowX: textShadowX.value,
          textShadowY: textShadowY.value,
          logoOpacity: logoOpacity.value,
          logoScale: logoScale.value,
          logoRotate: logoRotate.value,
          nudgeTarget: nudgeTarget.value,
          exportFormat: exportFormat.value,
          exportQuality: exportQuality.value
        },
        customTextPos: customTextPos ? { ...customTextPos } : null,
        customLogoPos: customLogoPos ? { ...customLogoPos } : null
      };
    }

    function setStateControls(snapshot) {
      const c = snapshot.controls;
      previewMode.value = c.previewMode;
      splitPos.value = c.splitPos;
      brightness.value = c.brightness;
      contrast.value = c.contrast;
      saturate.value = c.saturate;
      watermarkText.value = c.watermarkText;
      textPos.value = c.textPos;
      fontFamily.value = c.fontFamily;
      textIsBold = c.textIsBold;
      textIsItalic = c.textIsItalic;
      textOpacity.value = c.textOpacity;
      textSize.value = c.textSize;
      textRotate.value = c.textRotate;
      textStrokeColor.value = c.textStrokeColor;
      textStrokeWidth.value = c.textStrokeWidth;
      textShadowColor.value = c.textShadowColor;
      textShadowBlur.value = c.textShadowBlur;
      textShadowX.value = c.textShadowX;
      textShadowY.value = c.textShadowY;
      logoOpacity.value = c.logoOpacity;
      logoScale.value = c.logoScale;
      logoRotate.value = c.logoRotate;
      nudgeTarget.value = c.nudgeTarget;
      exportFormat.value = c.exportFormat;
      exportQuality.value = c.exportQuality;

      customTextPos = snapshot.customTextPos ? { ...snapshot.customTextPos } : null;
      customLogoPos = snapshot.customLogoPos ? { ...snapshot.customLogoPos } : null;
      refreshToggleButtons();
      updateOutputValues();
    }

    function loadImageTo(imageEl, src) {
      return new Promise(resolve => {
        if (!src) {
          imageEl.src = '';
          resolve(false);
          return;
        }
        imageEl.onload = () => resolve(true);
        imageEl.onerror = () => resolve(false);
        imageEl.src = src;
      });
    }

    async function applySnapshot(snapshot) {
      const loadedBase = await loadImageTo(img, snapshot.imageSrc);
      hasImage = loadedBase;
      if (hasImage) {
        canvas.width = img.naturalWidth;
        canvas.height = img.naturalHeight;
      }

      await loadImageTo(logoImg, snapshot.logoSrc);
      setStateControls(snapshot);

      downloadBtn.disabled = !hasImage;
      resetBtn.disabled = !hasImage;

      cropMode = false;
      isCropping = false;
      cropRect = null;
      refreshCropButtons();
      refreshLogoButtons();
      redraw();
    }

    function pushHistory() {
      if (!hasImage) return;
      const snapshot = getStateSnapshot();
      if (historyIndex >= 0) {
        const prev = JSON.stringify(history[historyIndex]);
        const curr = JSON.stringify(snapshot);
        if (prev === curr) return;
      }

      history = history.slice(0, historyIndex + 1);
      history.push(snapshot);
      if (history.length > MAX_HISTORY) {
        history.shift();
      }
      historyIndex = history.length - 1;
      refreshHistoryButtons();
    }

    async function undo() {
      if (historyIndex <= 0) return;
      historyIndex -= 1;
      refreshHistoryButtons();
      await applySnapshot(history[historyIndex]);
    }

    async function redo() {
      if (historyIndex < 0 || historyIndex >= history.length - 1) return;
      historyIndex += 1;
      refreshHistoryButtons();
      await applySnapshot(history[historyIndex]);
    }

    function clampCropRect(rect) {
      const x = Math.max(0, Math.min(canvas.width, rect.x));
      const y = Math.max(0, Math.min(canvas.height, rect.y));
      const endX = Math.max(0, Math.min(canvas.width, rect.x + rect.width));
      const endY = Math.max(0, Math.min(canvas.height, rect.y + rect.height));
      return {
        x,
        y,
        width: endX - x,
        height: endY - y
      };
    }

    function applyCrop() {
      if (!hasImage || !cropRect) return;
      const clamped = clampCropRect(cropRect);
      const w = Math.floor(Math.abs(clamped.width));
      const h = Math.floor(Math.abs(clamped.height));
      if (w < 5 || h < 5) return;

      const sx = Math.floor(Math.min(clamped.x, clamped.x + clamped.width));
      const sy = Math.floor(Math.min(clamped.y, clamped.y + clamped.height));

      const temp = document.createElement('canvas');
      temp.width = w;
      temp.height = h;
      const tctx = temp.getContext('2d');
      tctx.drawImage(img, sx, sy, w, h, 0, 0, w, h);

      img.onload = () => {
        canvas.width = img.naturalWidth;
        canvas.height = img.naturalHeight;
        hasImage = true;
        customTextPos = null;
        customLogoPos = null;
        cropMode = false;
        isCropping = false;
        cropRect = null;
        refreshCropButtons();
        redraw();
        pushHistory();
      };
      img.src = temp.toDataURL('image/png');
    }

    function startCropMode() {
      if (!hasImage) return;
      cropMode = !cropMode;
      isCropping = false;
      cropRect = null;
      refreshCropButtons();
      redraw();
    }

    function cancelCropMode() {
      cropMode = false;
      isCropping = false;
      cropRect = null;
      refreshCropButtons();
      redraw();
    }

    uploadInput.addEventListener('change', (event) => {
      const file = event.target.files?.[0];
      if (!file) return;

      const reader = new FileReader();
      reader.onload = () => {
        img.onload = () => {
          canvas.width = img.naturalWidth;
          canvas.height = img.naturalHeight;
          hasImage = true;
          downloadBtn.disabled = false;
          resetBtn.disabled = false;
          cropMode = false;
          isCropping = false;
          cropRect = null;
          history = [];
          historyIndex = -1;
          refreshHistoryButtons();
          refreshCropButtons();
          redraw();
          pushHistory();
        };
        img.src = reader.result;
      };
      reader.readAsDataURL(file);
    });

    logoUpload.addEventListener('change', (event) => {
      const file = event.target.files?.[0];
      if (!file) return;

      const reader = new FileReader();
      reader.onload = () => {
        logoImg.onload = () => {
          customLogoPos = getDefaultLogoPosition();
          refreshLogoButtons();
          redraw();
          pushHistory();
        };
        logoImg.src = reader.result;
      };
      reader.readAsDataURL(file);
    });

    removeLogoBtn.addEventListener('click', () => {
      logoImg.src = '';
      customLogoPos = null;
      refreshLogoButtons();
      redraw();
      pushHistory();
    });

    centerLogoBtn.addEventListener('click', () => {
      if (!logoImg.src || !hasImage) return;
      customLogoPos = { x: canvas.width / 2, y: canvas.height / 2 };
      redraw();
      pushHistory();
    });

    toggleBold.addEventListener('click', () => {
      textIsBold = !textIsBold;
      refreshToggleButtons();
      redraw();
      pushHistory();
    });

    toggleItalic.addEventListener('click', () => {
      textIsItalic = !textIsItalic;
      refreshToggleButtons();
      redraw();
      pushHistory();
    });

    [previewMode, splitPos, brightness, contrast, saturate, watermarkText, textPos, fontFamily, textOpacity, textSize, textRotate, textStrokeColor, textStrokeWidth, textShadowColor, textShadowBlur, textShadowX, textShadowY, logoOpacity, logoScale, logoRotate, exportFormat, exportQuality, nudgeTarget].forEach(el => {
      el.addEventListener('input', () => {
        if (el === textPos && textPos.value !== 'custom') {
          customTextPos = null;
        }
        updateOutputValues();
        redraw();
      });

      el.addEventListener('change', () => {
        if (el === textPos && textPos.value !== 'custom') {
          customTextPos = null;
        }
        redraw();
        pushHistory();
      });
    });

    canvas.addEventListener('pointerdown', (evt) => {
      if (!hasImage) return;
      const p = getCanvasPoint(evt);

      if (cropMode) {
        isCropping = true;
        cropRect = { x: p.x, y: p.y, width: 0, height: 0 };
        refreshCropButtons();
        redraw();
        canvas.setPointerCapture(evt.pointerId);
        return;
      }

      if (previewMode.value === 'original') return;

      if (logoBounds && isPointInRotatedLogo(p.x, p.y, logoBounds)) {
        isDraggingLogo = true;
        nudgeTarget.value = 'logo';
        customLogoPos = { x: logoBounds.cx, y: logoBounds.cy };
        dragOffset = {
          x: p.x - logoBounds.cx,
          y: p.y - logoBounds.cy
        };
        canvas.setPointerCapture(evt.pointerId);
        return;
      }

      if (!textBounds || !isPointInRotatedText(p.x, p.y, textBounds)) return;

      isDraggingText = true;
      textPos.value = 'custom';
      nudgeTarget.value = 'text';
      customTextPos = { x: textBounds.x, y: textBounds.y };
      dragOffset = {
        x: p.x - textBounds.x,
        y: p.y - textBounds.y
      };
      canvas.setPointerCapture(evt.pointerId);
    });

    canvas.addEventListener('pointermove', (evt) => {
      if (!hasImage) return;
      const p = getCanvasPoint(evt);

      if (cropMode && isCropping && cropRect) {
        cropRect.width = p.x - cropRect.x;
        cropRect.height = p.y - cropRect.y;
        refreshCropButtons();
        redraw();
        return;
      }

      if (isDraggingText && textBounds) {
        const fontSize = Number(textSize.value);
        const width = textBounds.width;

        const x = Math.min(Math.max(p.x - dragOffset.x, 0), Math.max(0, canvas.width - width));
        const y = Math.min(Math.max(p.y - dragOffset.y, fontSize), canvas.height);
        customTextPos = { x, y };
        redraw();
        return;
      }

      if (isDraggingLogo && logoBounds) {
        const x = p.x - dragOffset.x;
        const y = p.y - dragOffset.y;
        customLogoPos = { x, y };
        redraw();
      }
    });

    const stopPointer = (evt) => {
      if (isDraggingText || isDraggingLogo || isCropping) {
        if (evt?.pointerId !== undefined) {
          try {
            canvas.releasePointerCapture(evt.pointerId);
          } catch (_) {
            // ignore capture errors
          }
        }
      }

      const hadAction = isDraggingText || isDraggingLogo || isCropping;
      isDraggingText = false;
      isDraggingLogo = false;
      isCropping = false;
      if (hadAction) {
        refreshCropButtons();
        redraw();
        pushHistory();
      }
    };

    canvas.addEventListener('pointerup', stopPointer);
    canvas.addEventListener('pointercancel', stopPointer);

    window.addEventListener('keydown', (evt) => {
      if (!hasImage) return;

      const targetTag = (evt.target?.tagName || '').toLowerCase();
      if (targetTag === 'input' || targetTag === 'textarea' || targetTag === 'select') return;

      const key = evt.key;
      if (!['ArrowUp', 'ArrowDown', 'ArrowLeft', 'ArrowRight'].includes(key)) return;

      evt.preventDefault();
      const step = evt.shiftKey ? 10 : 1;

      let dx = 0;
      let dy = 0;
      if (key === 'ArrowLeft') dx = -step;
      if (key === 'ArrowRight') dx = step;
      if (key === 'ArrowUp') dy = -step;
      if (key === 'ArrowDown') dy = step;

      if (nudgeTarget.value === 'logo' && logoImg.src) {
        const current = customLogoPos || getDefaultLogoPosition();
        customLogoPos = { x: current.x + dx, y: current.y + dy };
      } else {
        if (!textBounds) return;
        textPos.value = 'custom';
        const current = customTextPos || { x: textBounds.x, y: textBounds.y };
        customTextPos = { x: current.x + dx, y: current.y + dy };
      }

      redraw();
      pushHistory();
    });

    undoBtn.addEventListener('click', undo);
    redoBtn.addEventListener('click', redo);

    cropModeBtn.addEventListener('click', startCropMode);
    applyCropBtn.addEventListener('click', applyCrop);
    cancelCropBtn.addEventListener('click', cancelCropMode);

    downloadBtn.addEventListener('click', () => {
      if (!hasImage) return;

      const format = exportFormat.value;
      const mime = format === 'png' ? 'image/png' : (format === 'webp' ? 'image/webp' : 'image/jpeg');
      const extension = format === 'jpeg' ? 'jpg' : format;
      const quality = Number(exportQuality.value) / 100;

      const link = document.createElement('a');
      link.download = `edited-image.${extension}`;
      if (mime === 'image/png') {
        link.href = canvas.toDataURL(mime);
      } else {
        link.href = canvas.toDataURL(mime, quality);
      }
      link.click();
    });

    resetBtn.addEventListener('click', () => {
      resetControls();
      pushHistory();
    });

    refreshToggleButtons();
    refreshHistoryButtons();
    refreshCropButtons();
    refreshLogoButtons();
    updateOutputValues();
  </script>
</body>
</html>
